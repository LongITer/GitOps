apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api
  namespace: demo
  labels:
    release: kube-prometheus-stack  # Nhãn quan trọng để Prometheus nhận diện
spec:
  selector:
    matchLabels:
      app: api
  endpoints:
    - { port: http, path: /metrics, interval: 15s }
